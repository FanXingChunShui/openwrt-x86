name: Build OpenWrt x86/64 Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      make_kernel_config:
        description: 'Run make kernel_config'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 2 * * 0'

env:
  OPENWRT_VERSION: 'openwrt-25.12'
  OPENWRT_REPO: 'https://github.com/openwrt/openwrt.git'
  TARGET_ARCH: 'x86_64'
  MAKE_JOBS: '$(nproc)'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Prepare ccache
        run: |
          mkdir -p ~/.cache/ccache
          echo "max_size = 10G" > ~/.cache/ccache/ccache.conf
          echo "compression = true" >> ~/.cache/ccache/ccache.conf

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: openwrt-ccache-${{ runner.os }}-${{ hashFiles('**/build-openwrt.yml') }}
          restore-keys: |
            openwrt-ccache-${{ runner.os }}-

      - name: Clone OpenWrt ${{ env.OPENWRT_VERSION }}
        run: |
          git clone --depth=1 --branch=${{ env.OPENWRT_VERSION }} ${{ env.OPENWRT_REPO }} openwrt

      - name: Copy preconfig
        run: |
          cp configs/x86-legacy.config openwrt/.config

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a

      - name: Add helloworld feed
        run: |
          cd openwrt
          git clone --depth=1 https://github.com/fw876/helloworld.git feeds/helloworld
          ./scripts/feeds update helloworld
          ./scripts/feeds install -a -p helloworld

      - name: Configure build
        run: |
          cd openwrt
          make defconfig

      - name: Build firmware
        run: |
          cd openwrt
          make -j${{ env.MAKE_JOBS }} || make -j1 V=s

      - name: Prepare artifacts
        run: |
          cd openwrt
          find bin/targets/x86/64 -name "*.img.gz" -type f | head -5

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86-64-firmware-${{ github.run_number }}
          path: |
            openwrt/bin/targets/x86/64/**/*.img.gz
            openwrt/bin/targets/x86/64/**/*.bin
          retention-days: 14
          if-no-files-found: error

      - name: Upload ccache statistics
        if: always()
        run: |
          ccache -s
