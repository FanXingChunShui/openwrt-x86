---
# Build OpenWrt x86 firmware with optimizations
# Triggers: push to main, pull requests, manual dispatch, weekly schedule

name: Build OpenWrt x86

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'  # Weekly: Sunday 2 AM UTC

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write
      packages: write

    env:
      BUILD_DIR: openwrt-src
      DEBIAN_FRONTEND: noninteractive
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    steps:
      # ============================================================================
      # PREPARATION PHASE
      # ============================================================================

      - id: install-deps
        name: Install build dependencies
        run: |
          echo "PATH=$PATH"
          sudo /usr/bin/apt-get update
          sudo /usr/bin/apt-get install -y \
            build-essential curl file g++ git libncurses5-dev \
            libncursesw5-dev libssl-dev python3 python3-pip \
            python3-venv tar unzip zlib1g-dev

      - id: checkout
        name: Checkout repository
        uses: actions/checkout@v4

      - id: setup-cache
        name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ runner.os }}-

      # ============================================================================
      # SOURCE & FEEDS PHASE
      # ============================================================================

      - id: clone-source
        name: Clone OpenWrt 25.12 source
        run: |
          if [ -d "$BUILD_DIR" ]; then
            echo "✓ Updating existing source..."
            cd "$BUILD_DIR"
            git fetch origin
            git reset --hard origin/openwrt-24.10
          else
            echo "✓ Cloning fresh source..."
            git clone \
              --depth=1 \
              --branch openwrt-24.10 \
              https://github.com/openwrt/openwrt.git \
              "$BUILD_DIR"
          fi

      - id: cache-builds
        name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.BUILD_DIR }}/staging_dir
            ${{ env.BUILD_DIR }}/build_dir/toolchain*
          key: buildcache-${{ runner.os }}-${{ hashFiles('**/.config') }}
          restore-keys: |
            buildcache-${{ runner.os }}-

      - id: update-feeds
        name: Update and install feeds
        run: |
          cd "$BUILD_DIR"

          echo "✓ Configuring feeds..."
          rm -f feeds.conf.default
          cat > feeds.conf.default << 'EOF'
          src-git packages https://github.com/openwrt/packages.git;openwrt-24.10
          src-git luci https://github.com/openwrt/luci.git;openwrt-24.10
          src-git routing https://github.com/openwrt/routing.git;openwrt-24.10
          src-git telephony https://github.com/openwrt/telephony.git;openwrt-24.10
          src-git helloworld https://github.com/fw876/helloworld.git;master
          EOF

          echo "✓ Updating feeds..."
          timeout 300 ./scripts/feeds update -a

          echo "✓ Installing feeds..."
          ./scripts/feeds install -a

      # ============================================================================
      # CONFIGURATION PHASE
      # ============================================================================

      - id: configure-x86
        name: Configure x86_64 build
        run: |
          cd "$BUILD_DIR"
          echo "✓ Applying x86_64 specific settings..."
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_ROOTFS_EXT4FS=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_ROOTFS_PARALLELSQUASHFS=y
          CONFIG_GRUB_IMAGES=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_TARGET_ROOTFS_PARTSIZE=4096
          CONFIG_TARGET_SWAP_PARTITIONSIZE=1024
          CONFIG_HIGHMEM4G=y
          CONFIG_HIGHMEM64G=n
          CONFIG_X86_5LEVEL=y
          CONFIG_NR_CPUS=8
          CONFIG_SMP=y
          CONFIG_HZ_1000=y
          CONFIG_HZ=1000
          CONFIG_CCACHE=y
          CONFIG_KERNEL_CCACHE=y
          CONFIG_PACKAGE_luci-app-ssr-plus=y
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_iptables=y
          CONFIG_PACKAGE_ipset=y
          CONFIG_PACKAGE_kmod-ipt-nat=y
          EOF

          echo "✓ Finalizing configuration..."
          make defconfig

      - id: add-plugins
        name: Add optional plugins
        continue-on-error: true
        run: |
          cd "$BUILD_DIR"

          echo "◆ Installing additional packages from feeds..."
          ./scripts/feeds install -a -p luci-app-openvpn || true
          ./scripts/feeds install -a -p luci-proto-wireguard || true
          ./scripts/feeds install -a -p luci-app-ddns || true
          ./scripts/feeds install -a -p ddns-scripts || true

      - id: config-network
        name: Configure network interfaces
        run: |
          cd "$BUILD_DIR"
          mkdir -p package/base-files/files/etc/config

          echo "✓ Creating network configuration..."
          cat > package/base-files/files/etc/config/network << 'NETCFG'
          config interface 'loopback'
          	option device 'lo'
          	option proto 'static'
          	option ipaddr '127.0.0.1'
          	option netmask '255.0.0.0'

          config interface 'lan'
          	option device 'eth0'
          	option proto 'static'
          	option ipaddr '192.168.10.251'
          	option netmask '255.255.255.0'
          	option gateway '192.168.10.1'
          	option ip6assign '60'
          NETCFG

      - id: config-firewall
        name: Create firewall UCI script
        run: |
          cd "$BUILD_DIR"
          mkdir -p package/base-files/files/etc/uci-defaults

          echo "✓ Creating firewall configuration script..."
          cat > package/base-files/files/etc/uci-defaults/99-firewall-config << 'FWSCRIPT'
          #!/bin/sh
          uci -q batch << 'EOC'
          set firewall.@zone[0]='zone'
          set firewall.@zone[0].name='lan'
          add_list firewall.@zone[0].network='lan'
          set firewall.@zone[0].input='ACCEPT'
          set firewall.@zone[0].output='ACCEPT'
          set firewall.@zone[0].forward='ACCEPT'

          add firewall zone
          set firewall.@zone[1]='zone'
          set firewall.@zone[1].name='wan'
          add_list firewall.@zone[1].network='wan'
          set firewall.@zone[1].input='REJECT'
          set firewall.@zone[1].output='ACCEPT'
          set firewall.@zone[1].forward='REJECT'
          set firewall.@zone[1].masq='1'
          set firewall.@zone[1].mtu_fix='1'

          add firewall forwarding
          set firewall.@forwarding[0]='forwarding'
          set firewall.@forwarding[0].src='lan'
          set firewall.@forwarding[0].dest='wan'

          add firewall rule
          set firewall.@rule[0]='rule'
          set firewall.@rule[0].name='Allow-OpenVPN'
          set firewall.@rule[0].src='wan'
          set firewall.@rule[0].dest_port='1194'
          set firewall.@rule[0].proto='udp'
          set firewall.@rule[0].target='ACCEPT'

          add firewall rule
          set firewall.@rule[1]='rule'
          set firewall.@rule[1].name='Allow-WireGuard'
          set firewall.@rule[1].src='wan'
          set firewall.@rule[1].dest_port='51820'
          set firewall.@rule[1].proto='udp'
          set firewall.@rule[1].target='ACCEPT'

          commit firewall
          EOC
          exit 0
          FWSCRIPT

          chmod +x package/base-files/files/etc/uci-defaults/99-firewall-config

      # ============================================================================
      # BUILD PHASE
      # ============================================================================

      - id: build
        name: Build firmware
        env:
          RUSTC_LLVM_DOWNLOAD: if-unchanged
        run: |
          cd "$BUILD_DIR"
          echo "Starting build with $MAKE_JOBS parallel job(s)..."
          make -j$MAKE_JOBS V=s 2>&1 | tee build.log
          BUILD_EXIT_CODE=${PIPESTATUS[0]}

          echo ""
          echo "========================================"
          echo "Build exit code: $BUILD_EXIT_CODE"
          echo "========================================"

          # Check for actual firmware files
          FIRM_FILES=$(find bin/targets -name "*.bin" -o -name "*.img" -o -name "*.img.gz" 2>/dev/null | wc -l)
          echo "Firmware files found: $FIRM_FILES"

          if [ "$BUILD_EXIT_CODE" -ne 0 ] || [ "$FIRM_FILES" -eq 0 ]; then
            echo "❌ Build failed!"
            echo ""
            echo "Last 100 lines of build.log:"
            tail -100 build.log
            exit 1
          fi
          echo "✓ Build completed successfully"

      # ============================================================================
      # POST-BUILD PHASE
      # ============================================================================

      - id: summary
        name: Generate build summary
        if: success()
        run: |
          cd "$BUILD_DIR"

          {
            echo "=== OpenWrt x86 Build Summary ==="
            echo "Build Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "GitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "Build Status: ✓ SUCCESS"
            echo ""

            if [ -d "bin/targets/x86/64" ]; then
              echo "Output Firmware:"
              ls -lh bin/targets/x86/64/ | tail -n +2 | awk '{print "  " $9 " (" $5 ")"}'
            fi
            echo ""
          } | tee build-summary.txt

      - id: upload-firmware
        name: Upload firmware artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86-firmware
          path: ${{ env.BUILD_DIR }}/bin/targets/x86/64/
          retention-days: 30
          if-no-files-found: warn

      - id: upload-logs
        name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            ${{ env.BUILD_DIR }}/build.log
            ${{ env.BUILD_DIR }}/build-summary.txt
            ${{ env.BUILD_DIR }}/logs/
          retention-days: 15
          if-no-files-found: ignore

      - id: release
        name: Create GitHub Release
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: build-${{ github.run_number }}
          name: OpenWrt x86 Build #${{ github.run_number }}
          bodyFile: ${{ env.BUILD_DIR }}/build-summary.txt
          draft: false
          prerelease: false
          artifacts: ${{ env.BUILD_DIR }}/bin/targets/x86/64/*.bin,${{ env.BUILD_DIR }}/bin/targets/x86/64/*.img.gz
          token: ${{ secrets.GITHUB_TOKEN }}
