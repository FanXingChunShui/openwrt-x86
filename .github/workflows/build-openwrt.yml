name: Build OpenWrt x86

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            curl \
            file \
            g++ \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libssl-dev \
            unzip \
            python3 \
            python3-pip \
            python3-venv

      - name: Clone OpenWrt 25.12 source
        run: |
          git clone --depth=1 --branch openwrt-25.12 https://github.com/openwrt/openwrt.git openwrt-src

      - name: Update feeds
        run: |
          cd openwrt-src
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure for x86
        run: |
          cd openwrt-src
          make defconfig
          echo 'CONFIG_TARGET_x86_64=y' >> .config
          echo 'CONFIG_TARGET_ROOTFS_EXT4FS=y' >> .config
          echo 'CONFIG_TARGET_ROOTFS_SQUASHFS=y' >> .config
          echo 'CONFIG_TARGET_ROOTFS_PARALLELSQUASHFS=y' >> .config
          echo 'CONFIG_GRUB_IMAGES=y' >> .config
          echo 'CONFIG_TARGET_IMAGES_GZIP=y' >> .config
          # Disk partition size: 1024MB swap, 4096MB rootfs
          echo 'CONFIG_TARGET_ROOTFS_PARTSIZE=4096' >> .config
          echo 'CONFIG_TARGET_SWAP_PARTITIONSIZE=1024' >> .config

      - name: Add passwall2 plugin
        run: |
          cd openwrt-src
          # Clone passwall2 from official repository
          rm -rf package/feeds/passwall2
          git clone --depth=1 https://github.com/Openwrt-Passwall/openwrt-passwall2.git package/feeds/passwall2
          ./scripts/feeds install -a -p passwall2

      - name: Add VPN and DDNS plugins
        run: |
          cd openwrt-src
          # Install VPN plugins (openvpn, wireguard)
          ./scripts/feeds install -a -p luci-app-openvpn
          ./scripts/feeds install -a -p luci-proto-wireguard
          # Install DDNS plugin
          ./scripts/feeds install -a -p luci-app-ddns
          ./scripts/feeds install -a -p ddns-scripts

      - name: Configure kernel memory (1024/4096)
        run: |
          cd openwrt-src
          # Configure kernel memory settings for x86
          # 1024MB base, 4096MB maximum memory configuration
          echo 'CONFIG_HIGHMEM4G=y' >> .config
          echo 'CONFIG_HIGHMEM64G=n' >> .config
          echo 'CONFIG_X86_5LEVEL=y' >> .config
          echo 'CONFIG_NR_CPUS=8' >> .config
          echo 'CONFIG_SMP=y' >> .config
          echo 'CONFIG_HZ_1000=y' >> .config
          echo 'CONFIG_HZ=1000' >> .config
          echo 'CONFIG_CCACHE=y' >> .config
          echo 'CONFIG_KERNEL_CCACHE=y' >> .config

      - name: Configure management IP
        run: |
          cd openwrt-src
          # Create base-files directory structure if not exists
          mkdir -p package/base-files/files/etc/config
          # Set default LAN IP to 192.168.10.251
          cat > package/base-files/files/etc/config/network << 'EOF'
config interface 'loopback'
        option device 'lo'
        option proto 'static'
        option ipaddr '127.0.0.1'
        option netmask '255.0.0.0'

config interface 'lan'
        option device 'eth0'
        option proto 'static'
        option ipaddr '192.168.10.251'
        option netmask '255.255.255.0'
        option gateway '192.168.10.1'
        option ip6assign '60'
EOF

      - name: Build OpenWrt
        env:
          BUILD_RAM: 4096
          SWAP: 1024
          MAKE_JOBS: 2
        run: |
          cd openwrt-src
          # Limit make jobs to prevent OOM with limited RAM
          make -j$(nproc) V=s
          # Or with limited memory: make -j2 V=s

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86-firmware
          path: openwrt-src/bin/targets/x86/64/*.bin
          retention-days: 7

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: openwrt-src/logs/
          retention-days: 7
